name: Test MCP Servers

# End-to-end test of MCP server wiring: --mcp-config (file path and inline
# JSON forms) must land in the generated $KIMI_CODE_HOME/mcp.json and the
# server must be callable by the agent. Runs only when the E2E_ENABLED
# repository variable is 'true' and a KIMI_API_KEY secret exists.

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test-mcp-config-file:
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: |
          bun install
          cd base-action/test/mcp-test
          bun install

      - name: Run agent with --mcp-config (file path)
        uses: ./base-action
        id: mcp-file-test
        with:
          prompt: "Call the test_tool tool and report its response."
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          kimi_args: |
            --allowedTools mcp__test-server__test_tool
            --mcp-config base-action/test/mcp-test/.mcp.json
        env:
          # Run from the test directory so the MCP server's relative path resolves
          KIMI_WORKING_DIR: ${{ github.workspace }}/base-action/test/mcp-test

      - name: Check MCP server output (file path form)
        run: |
          OUTPUT_FILE="${{ steps.mcp-file-test.outputs.execution_file }}"

          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "Error: Output file not found!"
            exit 1
          fi

          # The generated KIMI_CODE_HOME must contain the merged mcp.json
          MCP_JSON=$(ls ${RUNNER_TEMP}/kimi-home-*/mcp.json 2>/dev/null | head -1)
          if [ -z "$MCP_JSON" ]; then
            echo "✗ No mcp.json generated in KIMI_CODE_HOME"
            exit 1
          fi
          if jq -e '.mcpServers["test-server"]' "$MCP_JSON" > /dev/null; then
            echo "✓ test-server is registered in mcp.json"
          else
            echo "✗ test-server not found in mcp.json"
            cat "$MCP_JSON"
            exit 1
          fi

          # stream-json schema: assistant tool_calls + tool result messages
          if jq -e 'select(.role == "assistant") | .tool_calls[]? | select(.function.name == "mcp__test-server__test_tool")' "$OUTPUT_FILE" > /dev/null; then
            echo "✓ MCP test tool was called"
          else
            echo "✗ MCP test tool was not called"
            exit 1
          fi

          if jq -e 'select(.role == "tool") | select(.content | tostring | contains("Test tool response"))' "$OUTPUT_FILE" > /dev/null; then
            echo "✓ MCP test tool returned its response"
          else
            echo "✗ MCP test tool response not found"
            exit 1
          fi

          echo "✓ All MCP server checks passed (file path form)!"

  test-mcp-config-inline:
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: |
          bun install
          cd base-action/test/mcp-test
          bun install

      - name: Run agent with --mcp-config (inline JSON)
        uses: ./base-action
        id: mcp-inline-test
        with:
          prompt: "Call the test_tool tool and report its response."
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          kimi_args: |
            --allowedTools mcp__test-server__test_tool
            --mcp-config '{"mcpServers":{"test-server":{"type":"stdio","command":"bun","args":["simple-mcp-server.ts"],"env":{}}}}'
        env:
          # Run from the test directory so the MCP server's relative path resolves
          KIMI_WORKING_DIR: ${{ github.workspace }}/base-action/test/mcp-test

      - name: Check MCP server output (inline JSON form)
        run: |
          OUTPUT_FILE="${{ steps.mcp-inline-test.outputs.execution_file }}"

          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "Error: Output file not found!"
            exit 1
          fi

          MCP_JSON=$(ls ${RUNNER_TEMP}/kimi-home-*/mcp.json 2>/dev/null | head -1)
          if [ -z "$MCP_JSON" ]; then
            echo "✗ No mcp.json generated in KIMI_CODE_HOME"
            exit 1
          fi
          if jq -e '.mcpServers["test-server"]' "$MCP_JSON" > /dev/null; then
            echo "✓ test-server is registered in mcp.json"
          else
            echo "✗ test-server not found in mcp.json"
            cat "$MCP_JSON"
            exit 1
          fi

          if jq -e 'select(.role == "assistant") | .tool_calls[]? | select(.function.name == "mcp__test-server__test_tool")' "$OUTPUT_FILE" > /dev/null; then
            echo "✓ MCP test tool was called"
          else
            echo "✗ MCP test tool was not called"
            exit 1
          fi

          if jq -e 'select(.role == "tool") | select(.content | tostring | contains("Test tool response"))' "$OUTPUT_FILE" > /dev/null; then
            echo "✓ MCP test tool returned its response"
          else
            echo "✗ MCP test tool response not found"
            exit 1
          fi

          echo "✓ All MCP server checks passed (inline JSON form)!"

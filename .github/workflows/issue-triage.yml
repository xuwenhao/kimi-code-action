name: Kimi Issue Triage
description: Dogfood the action to triage issues on this repository. Gated behind E2E_ENABLED.
on:
  issues:
    types: [opened]

jobs:
  triage-issue:
    # Only runs when the E2E_ENABLED repository variable is 'true' and a
    # KIMI_API_KEY secret exists. The actor needs write access — the action
    # rejects actors without it (there is no bypass option).
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Kimi Code for Issue Triage
        uses: ./
        with:
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE_NUMBER: ${{ github.event.issue.number }}

            Triage this issue:
            1. Read the issue title and body.
            2. Review the repository's existing labels (e.g. via `gh label list`).
            3. Choose the most fitting existing labels for the issue. Do not
               create new labels.
            4. Apply the labels to the issue with `gh issue edit`.
            5. If (and only if) the issue is clearly missing information needed
               to act on it, add ONE polite comment asking for the specifics.
               Otherwise stay silent.

            Do not attempt to fix the issue or push code in this workflow.
          kimi_args: |
            --allowedTools "Bash(gh label list),Bash(gh issue view:*),Bash(gh issue edit:*),Bash(gh issue comment:*)"

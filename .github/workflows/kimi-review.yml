name: Kimi PR Review (dogfood)

# Self-hosted e2e for the review path: every PR opened/updated in this repo
# gets a tracked review with inline comments. Uses the action from this
# checkout (uses: ./).

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review-with-tracking:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: PR Review with Progress Tracking
        uses: ./
        with:
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a code review with the following focus areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization

            3. **Testing**
               - Verify adequate test coverage
               - Check for missing test scenarios

            Provide detailed feedback using inline comments for specific issues.
            Use top-level comments for general observations.

          # Tools for PR review
          kimi_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

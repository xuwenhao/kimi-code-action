name: Test Custom Executables

# End-to-end test of the custom-executable escape hatches
# (path_to_kimi_executable / path_to_bun_executable). Runs only when the
# E2E_ENABLED repository variable is 'true' and a KIMI_API_KEY secret exists.

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test-custom-executables:
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Bun manually
        run: |
          echo "Installing Bun..."
          curl -fsSL https://bun.sh/install | bash
          echo "Bun installed at: $HOME/.bun/bin/bun"

          # Verify Bun installation
          if [ -f "$HOME/.bun/bin/bun" ]; then
            echo "✅ Bun executable found"
            $HOME/.bun/bin/bun --version
          else
            echo "❌ Bun executable not found"
            exit 1
          fi

      - name: Install kimi-code CLI manually
        run: |
          echo "Installing kimi-code CLI..."
          npm install -g @moonshot-ai/kimi-code
          KIMI_BIN="$(npm prefix -g)/bin/kimi"
          echo "kimi installed at: $KIMI_BIN"

          # Verify kimi installation
          if [ -f "$KIMI_BIN" ]; then
            echo "✅ kimi executable found"
            ls -la "$KIMI_BIN"
            echo "KIMI_BIN=$KIMI_BIN" >> "$GITHUB_ENV"
          else
            echo "❌ kimi executable not found"
            exit 1
          fi

      - name: Test with both custom executables
        id: custom-test
        uses: ./base-action
        with:
          prompt: |
            List the files in the current directory starting with "package"
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          path_to_kimi_executable: ${{ env.KIMI_BIN }}
          path_to_bun_executable: /home/runner/.bun/bin/bun
          kimi_args: --allowedTools "LS,Read"

      - name: Verify custom executables worked
        run: |
          OUTPUT_FILE="${{ steps.custom-test.outputs.execution_file }}"
          CONCLUSION="${{ steps.custom-test.outputs.conclusion }}"

          echo "Conclusion: $CONCLUSION"
          echo "Output file: $OUTPUT_FILE"

          if [ "$CONCLUSION" = "success" ]; then
            echo "✅ Action completed successfully with both custom executables"
          else
            echo "❌ Action failed with custom executables"
            exit 1
          fi

          if [ -f "$OUTPUT_FILE" ] && [ -s "$OUTPUT_FILE" ]; then
            echo "✅ Execution log file created successfully"
            if jq -e . "$OUTPUT_FILE" > /dev/null 2>&1; then
              echo "✅ Output is a valid stream of JSON messages"
              # Verify the task was completed
              if grep -q "package" "$OUTPUT_FILE"; then
                echo "✅ Agent successfully listed package files"
              else
                echo "⚠️ Could not verify if package files were listed"
              fi
            else
              echo "❌ Output is not valid JSONL"
              exit 1
            fi
          else
            echo "❌ Execution log file not found or empty"
            exit 1
          fi

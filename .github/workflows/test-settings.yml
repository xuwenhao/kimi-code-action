name: Test Settings Feature

# End-to-end test of the `settings` input (a kimi config.toml fragment,
# inline or file path): permission rules in the fragment must land in the
# generated config.toml and take effect. Runs only when the E2E_ENABLED
# repository variable is 'true' and a KIMI_API_KEY secret exists.

on:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test-settings-inline-allow:
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test with inline settings TOML (echo allowed)
        id: inline-settings-test
        uses: ./base-action
        with:
          prompt: |
            Use Bash to echo "Hello from settings test"
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          settings: |
            [[permission.rules]]
            decision = "allow"
            pattern = "Bash(echo*)"

      - name: Verify echo worked
        run: |
          OUTPUT_FILE="${{ steps.inline-settings-test.outputs.execution_file }}"
          CONCLUSION="${{ steps.inline-settings-test.outputs.conclusion }}"

          echo "Conclusion: $CONCLUSION"

          if [ "$CONCLUSION" = "success" ]; then
            echo "✅ Action completed successfully"
          else
            echo "❌ Action failed"
            exit 1
          fi

          # Check that permission was NOT denied
          if grep -q "was denied by permission rule" "$OUTPUT_FILE"; then
            echo "❌ Echo command was denied when it should have been allowed"
            cat "$OUTPUT_FILE"
            exit 1
          fi

          # Check if the echo command worked
          if grep -q "Hello from settings test" "$OUTPUT_FILE"; then
            echo "✅ Bash echo command worked (allowed by permission rules)"
          else
            echo "❌ Bash echo command didn't work"
            cat "$OUTPUT_FILE"
            exit 1
          fi

  test-settings-inline-deny:
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Test with inline settings TOML (echo denied)
        id: inline-settings-test
        uses: ./base-action
        with:
          prompt: |
            Run the command `echo $HOME` to check the home directory path
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          settings: |
            [[permission.rules]]
            decision = "deny"
            pattern = "Bash(echo*)"
            reason = "echo is blocked for this test"

      - name: Verify echo was denied
        run: |
          OUTPUT_FILE="${{ steps.inline-settings-test.outputs.execution_file }}"

          # Check that permission was denied in the tool result message
          if grep -q "was denied by permission rule" "$OUTPUT_FILE"; then
            echo "✅ Echo command was correctly denied by permission rules"
          else
            echo "❌ Expected permission denied message not found"
            cat "$OUTPUT_FILE"
            exit 1
          fi

  test-settings-file-allow:
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create settings file (echo allowed)
        run: |
          cat > test-settings.toml << EOF
          [[permission.rules]]
          decision = "allow"
          pattern = "Bash(echo*)"
          EOF

      - name: Test with settings file
        id: file-settings-test
        uses: ./base-action
        with:
          prompt: |
            Use Bash to echo "Hello from settings file test"
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          settings: "test-settings.toml"

      - name: Verify echo worked
        run: |
          OUTPUT_FILE="${{ steps.file-settings-test.outputs.execution_file }}"
          CONCLUSION="${{ steps.file-settings-test.outputs.conclusion }}"

          echo "Conclusion: $CONCLUSION"

          if [ "$CONCLUSION" = "success" ]; then
            echo "✅ Action completed successfully"
          else
            echo "❌ Action failed"
            exit 1
          fi

          # Check that permission was NOT denied
          if grep -q "was denied by permission rule" "$OUTPUT_FILE"; then
            echo "❌ Echo command was denied when it should have been allowed"
            cat "$OUTPUT_FILE"
            exit 1
          fi

          # Check if the echo command worked
          if grep -q "Hello from settings file test" "$OUTPUT_FILE"; then
            echo "✅ Bash echo command worked (allowed by permission rules)"
          else
            echo "❌ Bash echo command didn't work"
            cat "$OUTPUT_FILE"
            exit 1
          fi

  test-settings-file-deny:
    if: ${{ vars.E2E_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create settings file (echo denied)
        run: |
          cat > test-settings.toml << EOF
          [[permission.rules]]
          decision = "deny"
          pattern = "Bash(echo*)"
          reason = "echo is blocked for this test"
          EOF

      - name: Test with settings file
        id: file-settings-test
        uses: ./base-action
        with:
          prompt: |
            Run the command `echo $HOME` to check the home directory path
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}
          settings: "test-settings.toml"

      - name: Verify echo was denied
        run: |
          OUTPUT_FILE="${{ steps.file-settings-test.outputs.execution_file }}"

          # Check that permission was denied in the tool result message
          if grep -q "was denied by permission rule" "$OUTPUT_FILE"; then
            echo "✅ Echo command was correctly denied by permission rules"
          else
            echo "❌ Expected permission denied message not found"
            cat "$OUTPUT_FILE"
            exit 1
          fi

name: Kimi Code

# The standard @kimi integration: mention @kimi in an issue, PR comment, or
# review and the agent responds in a tracking comment. Also usable as a
# general automation entrypoint via workflow_dispatch.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  kimi:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@kimi')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@kimi')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@kimi')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@kimi') || contains(github.event.issue.title, '@kimi')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read # Required for the agent to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Kimi Code
        id: kimi
        uses: xuwenhao/kimi-code-action@v0
        with:
          kimi_api_key: ${{ secrets.KIMI_API_KEY }}

          # Optional: Customize the trigger phrase (default: @kimi)
          # trigger_phrase: "/kimi"

          # Optional: Trigger when a specific user is assigned to an issue
          # assignee_trigger: "kimi-bot"

          # Optional: Configure the agent's behavior with CLI arguments
          # kimi_args: |
          #   --model kimi-for-coding
          #   --max-turns 20
          #   --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*)"
          #   --append-system-prompt "Follow our coding standards. Ensure all new code has tests."

          # Optional: Advanced settings (kimi config.toml fragment)
          # settings: |
          #   [loop_control]
          #   max_steps_per_turn = 30

name: "Kimi Code Base Action"
description: "Run the kimi-code CLI in GitHub Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  # Agent arguments
  prompt:
    description: "The prompt to send to the agent (mutually exclusive with prompt_file)"
    required: false
    default: ""
  prompt_file:
    description: "Path to a file containing the prompt to send to the agent (mutually exclusive with prompt)"
    required: false
    default: ""
  settings:
    description: "kimi config.toml fragment as a string, or path to a .toml file (appended to the generated config.toml)"
    required: false
    default: ""

  # Action settings
  kimi_args:
    description: "Additional arguments to pass directly to the kimi CLI (e.g., '--max-turns 3 --mcp-config /path/to/config.json')"
    required: false
    default: ""

  # Authentication settings
  kimi_api_key:
    description: "Kimi API key"
    required: false
    default: ""
  kimi_model:
    description: "Model name used to synthesize the kimi provider (KIMI_MODEL_NAME)"
    required: false
    default: "kimi-for-coding"
  kimi_base_url:
    description: "Optional base URL for the kimi provider (KIMI_MODEL_BASE_URL)"
    required: false
    default: ""
  kimi_version:
    description: "kimi-code CLI version to install (npm dist-tag or version). Empty installs latest."
    required: false
    default: ""

  use_node_cache:
    description: "Whether to use Node.js dependency caching (set to true only for Node.js projects with lock files)"
    required: false
    default: "false"
  path_to_kimi_executable:
    description: "Optional path to a custom kimi executable. If provided, skips automatic installation and uses this executable instead. WARNING: Using an older version may cause problems if the action begins taking advantage of new kimi features. This input is typically not needed unless you're debugging something specific or have unique needs in your environment."
    required: false
    default: ""
  path_to_bun_executable:
    description: "Optional path to a custom Bun executable. If provided, skips automatic Bun installation and uses this executable instead. WARNING: Using an incompatible version may cause problems if the action requires specific Bun features. This input is typically not needed unless you're debugging something specific or have unique needs in your environment."
    required: false
    default: ""
  show_full_output:
    description: "Show full JSON output from the agent run. WARNING: This outputs ALL messages including tool execution results which may contain secrets, API keys, or other sensitive information. These logs are publicly visible in GitHub Actions. Only enable for debugging in non-sensitive environments."
    required: false
    default: "false"

outputs:
  conclusion:
    description: "Execution status of the agent run ('success' or 'failure')"
    value: ${{ steps.run_kimi.outputs.conclusion }}
  execution_file:
    description: "Path to the file containing the agent execution log"
    value: ${{ steps.run_kimi.outputs.execution_file }}
  session_id:
    description: "The kimi session ID that can be used with -r to continue this conversation"
    value: ${{ steps.run_kimi.outputs.session_id }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # https://github.com/actions/setup-node/releases/tag/v6.4.0
      with:
        node-version: ${{ env.NODE_VERSION || '24' }}
        cache: ${{ inputs.use_node_cache == 'true' && 'npm' || '' }}
        package-manager-cache: false

    - name: Install Bun
      if: inputs.path_to_bun_executable == ''
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # https://github.com/oven-sh/setup-bun/releases/tag/v2.2.0
      with:
        bun-version: 1.3.14

    - name: Setup Custom Bun Path
      if: inputs.path_to_bun_executable != ''
      shell: bash
      env:
        PATH_TO_BUN_EXECUTABLE: ${{ inputs.path_to_bun_executable }}
      run: |
        echo "Using custom Bun executable: $PATH_TO_BUN_EXECUTABLE"
        # Add the directory containing the custom executable to PATH
        BUN_DIR=$(dirname "$PATH_TO_BUN_EXECUTABLE")
        echo "$BUN_DIR" >> "$GITHUB_PATH"

    - name: Install Dependencies
      shell: bash
      run: |
        cd ${GITHUB_ACTION_PATH}
        bun install --production

    - name: Install kimi-code CLI
      shell: bash
      env:
        PATH_TO_KIMI_EXECUTABLE: ${{ inputs.path_to_kimi_executable }}
        KIMI_VERSION: ${{ inputs.kimi_version }}
      run: |
        if [ -z "$PATH_TO_KIMI_EXECUTABLE" ]; then
          VERSION="${KIMI_VERSION:-latest}"
          echo "Installing kimi-code CLI (@moonshot-ai/kimi-code@${VERSION})..."
          for attempt in 1 2 3; do
            echo "Installation attempt $attempt..."
            npm install -g "@moonshot-ai/kimi-code@${VERSION}" && break
            if [ $attempt -eq 3 ]; then
              echo "Failed to install kimi-code CLI after 3 attempts"
              exit 1
            fi
            echo "Installation failed, retrying..."
            sleep 5
          done
          echo "kimi-code CLI installed successfully"
        else
          echo "Using custom kimi executable: $PATH_TO_KIMI_EXECUTABLE"
          # Add the directory containing the custom executable to PATH
          KIMI_DIR=$(dirname "$PATH_TO_KIMI_EXECUTABLE")
          echo "$KIMI_DIR" >> "$GITHUB_PATH"
        fi

    - name: Run Kimi Code Base Action
      shell: bash
      id: run_kimi
      run: |
        # Change to KIMI_WORKING_DIR if set (for running in custom directories)
        if [ -n "$KIMI_WORKING_DIR" ]; then
          echo "Changing directory to KIMI_WORKING_DIR: $KIMI_WORKING_DIR"
          cd "$KIMI_WORKING_DIR"
        fi
        bun run ${GITHUB_ACTION_PATH}/src/index.ts
      env:
        # Model configuration
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_PROMPT_FILE: ${{ inputs.prompt_file }}
        INPUT_SETTINGS: ${{ inputs.settings }}
        INPUT_KIMI_ARGS: ${{ inputs.kimi_args }}
        INPUT_PATH_TO_KIMI_EXECUTABLE: ${{ inputs.path_to_kimi_executable }}
        INPUT_PATH_TO_BUN_EXECUTABLE: ${{ inputs.path_to_bun_executable }}
        INPUT_SHOW_FULL_OUTPUT: ${{ inputs.show_full_output }}

        # Provider configuration
        KIMI_API_KEY: ${{ inputs.kimi_api_key }}
        KIMI_MODEL_NAME: ${{ inputs.kimi_model }}
        KIMI_MODEL_API_KEY: ${{ inputs.kimi_api_key }}
        KIMI_MODEL_BASE_URL: ${{ inputs.kimi_base_url }}

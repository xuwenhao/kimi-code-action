name: "Kimi Code Action"
description: "Flexible GitHub automation platform driven by the kimi-code CLI. Auto-detects mode based on event type: PR reviews, @kimi mentions, or custom automation."
branding:
  icon: "at-sign"
  color: "blue"

inputs:
  trigger_phrase:
    description: "The trigger phrase to look for in comments or issue body"
    required: false
    default: "@kimi"
  assignee_trigger:
    description: "The assignee username that triggers the action (e.g. @kimi)"
    required: false
  label_trigger:
    description: "The label that triggers the action (e.g. kimi)"
    required: false
    default: "kimi"
  base_branch:
    description: "The branch to use as the base/source when creating new branches (defaults to repository default branch)"
    required: false
  branch_prefix:
    description: "The prefix to use for kimi branches (defaults to 'kimi/', use 'kimi-' for dash format)"
    required: false
    default: "kimi/"
  branch_name_template:
    description: "Template for branch naming. Available variables: {{prefix}}, {{entityType}}, {{entityNumber}}, {{timestamp}}, {{sha}}, {{label}}, {{description}}. {{label}} will be first label from the issue/PR, or {{entityType}} as a fallback. {{description}} will be the first 5 words of the issue/PR title in kebab-case. Default: '{{prefix}}{{entityType}}-{{entityNumber}}-{{timestamp}}'"
    required: false
    default: ""
  allowed_bots:
    description: "Comma-separated list of allowed bot usernames, or '*' to allow all bots. Empty string (default) allows no bots. WARNING: On public repos with '*', external Apps may be able to invoke this action with prompts they control. See docs/security.md."
    required: false
    default: ""
  include_comments_by_actor:
    description: "Comma-separated list of actor usernames to INCLUDE in comments. Supports wildcards: '*[bot]' matches all bots, 'dependabot[bot]' matches specific bot. Empty (default) includes all actors."
    required: false
    default: ""
  exclude_comments_by_actor:
    description: "Comma-separated list of actor usernames to EXCLUDE from comments. Supports wildcards: '*[bot]' matches all bots, 'renovate[bot]' matches specific bot. Empty (default) excludes none. If actor is in both lists, exclusion takes priority."
    required: false
    default: ""

  # Agent configuration
  prompt:
    description: "Instructions for the agent. Can be a direct prompt or custom template."
    required: false
    default: ""
  settings:
    description: "kimi config.toml fragment as a string, or path to a .toml file (appended to the generated config.toml)"
    required: false
    default: ""

  # Auth configuration
  kimi_api_key:
    description: "Kimi API key"
    required: false
  kimi_model:
    description: "Model name used to synthesize the kimi provider (KIMI_MODEL_NAME)"
    required: false
    default: "kimi-for-coding"
  kimi_base_url:
    description: "Base URL for the kimi provider (KIMI_MODEL_BASE_URL). Defaults to the Kimi Code managed endpoint; Open Platform users (platform.moonshot.cn / platform.kimi.com) must override this AND kimi_model."
    required: false
    default: "https://api.kimi.com/coding/v1"
  kimi_version:
    description: "kimi-code CLI version to install (npm dist-tag or version). Empty installs latest."
    required: false
    default: ""
  github_token:
    description: "GitHub token with repo and pull request permissions"
    required: false

  kimi_args:
    description: "Additional arguments to pass directly to the kimi CLI"
    required: false
    default: ""
  use_sticky_comment:
    description: "Use just one comment to deliver issue/PR comments"
    required: false
    default: "false"
  classify_inline_comments:
    description: "Buffer inline comments without confirmed=true and classify them (real review vs test/probe) before posting after the session ends. Set to 'false' to post all inline comments immediately (pre-buffering behavior)."
    required: false
    default: "true"
  use_commit_signing:
    description: "Enable commit signing using GitHub's commit signature verification. When false, the agent uses standard git commands"
    required: false
    default: "false"
  ssh_signing_key:
    description: "SSH private key for signing commits. When provided, git will be configured to use SSH signing. Takes precedence over use_commit_signing."
    required: false
    default: ""
  bot_id:
    description: "GitHub user ID to use for git operations (defaults to github-actions[bot]'s user ID)"
    required: false
    default: "41898282" # github-actions[bot] user ID - see src/github/constants.ts
  bot_name:
    description: "GitHub username to use for git operations (defaults to github-actions[bot])"
    required: false
    default: "github-actions[bot]"
  track_progress:
    description: "Force tag mode with tracking comments for pull_request and issue events. Only applicable to pull_request (opened, synchronize, ready_for_review, reopened) and issue (opened, edited, labeled, assigned) events."
    required: false
    default: "false"
  path_to_kimi_executable:
    description: "Optional path to a custom kimi executable. If provided, skips automatic installation and uses this executable instead. WARNING: Using an older version may cause problems if the action begins taking advantage of new kimi features. This input is typically not needed unless you're debugging something specific or have unique needs in your environment."
    required: false
    default: ""
  path_to_bun_executable:
    description: "Optional path to a custom Bun executable. If provided, skips automatic Bun installation and uses this executable instead. WARNING: Using an incompatible version may cause problems if the action requires specific Bun features. This input is typically not needed unless you're debugging something specific or have unique needs in your environment."
    required: false
    default: ""
  display_report:
    description: "Whether to display the Kimi Code Report in GitHub Step Summary. Set to 'false' to disable when using custom formatting solutions. WARNING: This outputs agent-authored content in the GitHub Step Summary. This should only be used in cases where the action is used solely with trusted input."
    required: false
    default: "false"
  show_full_output:
    description: "Show full JSON output from the agent run. WARNING: This outputs ALL messages including tool execution results which may contain secrets, API keys, or other sensitive information. These logs are publicly visible in GitHub Actions. Only enable for debugging in non-sensitive environments."
    required: false
    default: "false"

outputs:
  execution_file:
    description: "Path to the agent execution output file"
    value: ${{ steps.run.outputs.execution_file }}
  branch_name:
    description: "The branch created by the agent for this execution"
    value: ${{ steps.run.outputs.branch_name }}
  github_token:
    description: "The GitHub token used by the action"
    value: ${{ steps.run.outputs.github_token }}
  session_id:
    description: "The kimi session ID that can be used with `kimi -r` to continue this conversation"
    value: ${{ steps.run.outputs.session_id }}

runs:
  using: "composite"
  steps:
    - name: Install Bun
      id: setup-bun
      if: inputs.path_to_bun_executable == ''
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # https://github.com/oven-sh/setup-bun/releases/tag/v2.2.0
      with:
        bun-version: 1.3.14
        token: ${{ inputs.github_token || github.token }}

    - name: Setup Custom Bun Path
      if: inputs.path_to_bun_executable != ''
      shell: bash
      env:
        PATH_TO_BUN_EXECUTABLE: ${{ inputs.path_to_bun_executable }}
      run: |
        echo "Using custom Bun executable: $PATH_TO_BUN_EXECUTABLE"
        # Add the directory containing the custom executable to PATH
        BUN_DIR=$(dirname "$PATH_TO_BUN_EXECUTABLE")
        echo "$BUN_DIR" >> "$GITHUB_PATH"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24

    - name: Install Dependencies
      shell: bash
      run: |
        cd ${GITHUB_ACTION_PATH}
        bun install --production

    - name: Run Kimi Code Action
      id: run
      shell: bash
      run: |
        # Do NOT pass --tsconfig-override here. It triggers a Bun runtime bug
        # ("Internal error: directory mismatch for directory .../tsconfig.json")
        # that aborts the run with exit code 1. Bun already auto-discovers the
        # action's own tsconfig.json by walking up from the entry file, so the
        # override is redundant. See oven-sh/bun#25730.
        bun --no-env-file \
          --config="${GITHUB_ACTION_PATH}/bunfig.toml" \
          run ${GITHUB_ACTION_PATH}/src/entrypoints/run.ts
      env:
        # Prepare inputs
        PROMPT: ${{ inputs.prompt }}
        TRIGGER_PHRASE: ${{ inputs.trigger_phrase }}
        ASSIGNEE_TRIGGER: ${{ inputs.assignee_trigger }}
        LABEL_TRIGGER: ${{ inputs.label_trigger }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        BRANCH_PREFIX: ${{ inputs.branch_prefix }}
        BRANCH_NAME_TEMPLATE: ${{ inputs.branch_name_template }}
        OVERRIDE_GITHUB_TOKEN: ${{ inputs.github_token }}
        ALLOWED_BOTS: ${{ inputs.allowed_bots }}
        INCLUDE_COMMENTS_BY_ACTOR: ${{ inputs.include_comments_by_actor }}
        EXCLUDE_COMMENTS_BY_ACTOR: ${{ inputs.exclude_comments_by_actor }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        USE_STICKY_COMMENT: ${{ inputs.use_sticky_comment }}
        CLASSIFY_INLINE_COMMENTS: ${{ inputs.classify_inline_comments }}
        DEFAULT_WORKFLOW_TOKEN: ${{ github.token }}
        USE_COMMIT_SIGNING: ${{ inputs.use_commit_signing }}
        SSH_SIGNING_KEY: ${{ inputs.ssh_signing_key }}
        BOT_ID: ${{ inputs.bot_id }}
        BOT_NAME: ${{ inputs.bot_name }}
        TRACK_PROGRESS: ${{ inputs.track_progress }}
        KIMI_ARGS: ${{ inputs.kimi_args }}
        ALL_INPUTS: ${{ toJson(inputs) }}

        # Base-action inputs
        INPUT_PROMPT_FILE: ${{ runner.temp }}/kimi-prompts/kimi-prompt.txt
        INPUT_SETTINGS: ${{ inputs.settings }}
        INPUT_PATH_TO_KIMI_EXECUTABLE: ${{ inputs.path_to_kimi_executable }}
        INPUT_PATH_TO_BUN_EXECUTABLE: ${{ inputs.path_to_bun_executable }}
        INPUT_SHOW_FULL_OUTPUT: ${{ inputs.show_full_output }}
        DISPLAY_REPORT: ${{ inputs.display_report }}
        PATH_TO_KIMI_EXECUTABLE: ${{ inputs.path_to_kimi_executable }}

        # Model configuration
        NODE_VERSION: ${{ env.NODE_VERSION }}
        KIMI_VERSION: ${{ inputs.kimi_version }}

        # Provider configuration
        KIMI_API_KEY: ${{ inputs.kimi_api_key }}
        KIMI_MODEL_NAME: ${{ inputs.kimi_model }}
        KIMI_MODEL_API_KEY: ${{ inputs.kimi_api_key }}
        KIMI_MODEL_BASE_URL: ${{ inputs.kimi_base_url }}

        # MCP configuration — these env vars are read directly from process.env by the
        # agent CLI subprocess. They must be listed explicitly here because this step's
        # env: block shadows the calling workflow's job-level env vars (GitHub Actions
        # composite action behavior). Set these in your workflow's job-level env: or via
        # a prior step that writes to $GITHUB_ENV.
        MCP_TIMEOUT: ${{ env.MCP_TIMEOUT }}
        MCP_TOOL_TIMEOUT: ${{ env.MCP_TOOL_TIMEOUT }}
        MAX_MCP_OUTPUT_TOKENS: ${{ env.MAX_MCP_OUTPUT_TOKENS }}

    - name: Cleanup SSH signing key
      if: always() && inputs.ssh_signing_key != ''
      shell: bash
      run: |
        # No --tsconfig-override: see the "Run Kimi Code Action" step above.
        bun --no-env-file \
          --config="${GITHUB_ACTION_PATH}/bunfig.toml" \
          run ${GITHUB_ACTION_PATH}/src/entrypoints/cleanup-ssh-signing.ts

    - name: Post buffered inline comments
      if: always() && inputs.classify_inline_comments != 'false'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.run.outputs.github_token || inputs.github_token || github.token }}
        REPO_OWNER: ${{ github.event.repository.owner.login }}
        REPO_NAME: ${{ github.event.repository.name }}
        PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        KIMI_API_KEY: ${{ inputs.kimi_api_key }}
        KIMI_MODEL_NAME: ${{ inputs.kimi_model }}
        KIMI_BASE_URL: ${{ inputs.kimi_base_url }}
      run: |
        # No --tsconfig-override: see the "Run Kimi Code Action" step above.
        bun --no-env-file \
          --config="${GITHUB_ACTION_PATH}/bunfig.toml" \
          run ${GITHUB_ACTION_PATH}/src/entrypoints/post-buffered-inline-comments.ts
